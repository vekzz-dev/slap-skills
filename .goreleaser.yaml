# GoReleaser configuration for slap-skills CLI
# https://goreleaser.com

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: slap
    main: .
    binary: slap
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: slap
    formats: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  name_template: "{{ .Tag }}-next"

brews:
  - name: slap-skills
    repository:
      owner: vekzz-dev
      name: homebrew-tap

    description: "CLI to manage your opencode skills from any git repo"
    homepage: "https://github.com/vekzz-dev/slap-skills"
    license: "MIT"
    test: |
      system "#{bin}/slap", "--help"
    install: |
      bin.install "slap"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - merge conflict
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: "Features"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: "Code maintenance"
      order: 2

release:
  github:
    owner: vekzz-dev
    name: slap-skills
  prerelease: auto
